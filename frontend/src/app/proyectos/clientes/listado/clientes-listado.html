<p-dialog header="Clientes" [modal]="true" [(visible)]="visible" [style]="{ width: '40rem' }">
  <div class="clientes-dialog-content">
    <div class="clientes-toolbar">
      <p-button id="boton-crear-cliente" icon="pi pi-plus" label="Crear Cliente" (click)="crearCliente()" severity="primary"></p-button>
    </div>

    @if (clientes().length > 0) {
      <div class="clientes-list">
        @for (cliente of clientes(); track cliente.id) {
          <div class="cliente-item">
            <span class="cliente-name">{{ cliente.nombre }}</span>
            <p-tag [value]="cliente.estado" [severity]="cliente.estado === 'ACTIVO' ? 'success' : 'danger'" />
            <div class="cliente-actions">
              <p-button icon="pi pi-pencil" pTooltip="Editar Cliente" (click)="editarCliente(cliente)" severity="secondary" [rounded]="true" [text]="true"></p-button>
            </div>
          </div>
        }
      </div>
    } @else {
      <div class="table-empty">No se encontraron clientes.</div>
    }
  </div>
</p-dialog>
<app-gestion-cliente [(visible)]="dialogVisible" [(clienteSeleccionado)]="clienteSeleccionado"></app-gestion-cliente>
