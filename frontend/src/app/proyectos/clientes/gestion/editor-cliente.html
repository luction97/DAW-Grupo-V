<p-dialog [header]="header()" [modal]="true" [(visible)]="visible" [style]="{ width: '28rem' }"
    (onHide)="cerrar()">
    <form [formGroup]="form" class="gestion-form">
        <div class="gestion-form-body">
            <div class="field">
                <label for="nombre" class="field-label">Nombre del cliente</label>
                <input pInputText type="text" id="nombre" placeholder="Ej: Empresa S.A." formControlName="nombre" />
            </div>
            @if (clienteActual()) {
            <div class="field">
                <label for="estado" class="field-label">Estado</label>
                <p-select id="estado" formControlName="estado" [options]="estados()" placeholder="Seleccionar estado" appendTo="body" />
            </div>
            }
        </div>
        <div class="gestion-form-footer">
            <button pButton label="Cancelar" (click)="cerrar()" severity="secondary"></button>
            <button pButton label="Guardar" (click)="enviarCliente()" severity="primary"></button>
        </div>
    </form>
</p-dialog>
